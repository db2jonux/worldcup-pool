<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>월드컵 스코어 맞추기 풀 · 한국 vs 멕시코</title>

<!--
====================================================================
 설정 방법 (한 번만 하면 됨, 컴퓨터에서 하는 걸 권장)
====================================================================
1) https://console.firebase.google.com 에서 프로젝트 생성 (무료)
2) 좌측 "빌드 > Realtime Database" → "데이터베이스 만들기"
   - 위치 선택 후 "테스트 모드로 시작" 선택 (친목용)
3) 생성되면 상단에 데이터베이스 URL이 보여요. 예:
   https://내프로젝트-default-rtdb.firebaseio.com
   → 아래 CONFIG.DB_URL 에 그대로 붙여넣기
4) Realtime Database > 규칙(Rules) 탭에서 아래로 저장(친목용 공개 규칙):
   {
     "rules": { ".read": true, ".write": true }
   }
   ※ 누구나 읽고 쓸 수 있는 규칙이라 친목용에만 쓰세요.
5) 이 .html 파일을 어디든 올리면 끝:
   - 가장 쉬움: https://app.netlify.com/drop 에 파일을 끌어다 놓기
   - 또는 Firebase Hosting / Vercel / GitHub Pages
6) 올라온 주소를 친구들에게 공유 → 모두 같은 풀을 실시간으로 봅니다.

* DB_URL 을 비워두면 백엔드 없이 "이 기기 전용"으로도 동작합니다.
====================================================================
-->

<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.24.7/babel.min.js"></script>

<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: #0a0e1a; }
  #root { min-height: 100vh; }
  @keyframes pulse { 0%,100%{ text-shadow:0 0 18px #ffc94d44; box-shadow:0 6px 24px #ffc94d33 } 50%{ text-shadow:0 0 30px #ffc94d88; box-shadow:0 6px 30px #ffc94d66 } }
  @keyframes popIn { 0%{ transform:scale(.3); opacity:0 } 60%{ transform:scale(1.15); opacity:1 } 100%{ transform:scale(1) } }
  @keyframes boardIn { 0%{ transform:scale(.7) translateY(20px); opacity:0 } 100%{ transform:scale(1) translateY(0); opacity:1 } }
  @keyframes verdictIn { 0%{ transform:translateY(16px); opacity:0 } 100%{ transform:translateY(0); opacity:1 } }
  @keyframes drumBounce { 0%,100%{ transform:translateY(0); opacity:.4 } 50%{ transform:translateY(-12px); opacity:1 } }
  @keyframes confettiFall { 0%{ transform:translateY(-12vh) rotate(0deg); opacity:0 } 10%{ opacity:1 } 100%{ transform:translateY(96vh) rotate(720deg); opacity:.9 } }
  @media (prefers-reduced-motion: reduce){ *{ animation:none !important; transition:none !important } }
  button:focus-visible, input:focus-visible { outline:2px solid #ffc94d; outline-offset:2px }
  input::placeholder{ color:#5a678a }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useMemo, useRef } = React;

/* ====================== CONFIG (여기를 채우세요) ====================== */
const CONFIG = {
  DB_URL: "",                 // 예: "https://your-project-default-rtdb.firebaseio.com"
  POOL_ID: "korea-mexico-a2", // 풀 구분용 id (여러 경기 운영 시 바꾸면 됨)
  ADMIN_PIN: "2026",          // 관리자 4자리 PIN
};
const ENTRY_FEE = 10000;
/* ==================================================================== */

const C = {
  bg: "#0a0e1a", panel: "#121a2e", panel2: "#0e1525", line: "#22304e",
  text: "#eef2fb", muted: "#8593b4", faint: "#5a678a",
  gold: "#ffc94d", goldDim: "#a8842f",
  kr: "#e23744", krBlue: "#2a5cff", mx: "#00a45a", mxRed: "#d62828",
};
const won = (n) => n.toLocaleString("ko-KR") + "원";
const uid = () => Date.now().toString(36) + "-" + Math.random().toString(36).slice(2, 8);
const withTimeout = (p, ms) => Promise.race([
  Promise.resolve(p),
  new Promise((_, rej) => setTimeout(() => rej(new Error("timeout")), ms)),
]);

/* ---------- 2026 월드컵 조 편성 (A~L) ---------- */
const GROUPS = {
  A: [["멕시코", "🇲🇽"], ["남아공", "🇿🇦"], ["대한민국", "🇰🇷"], ["체코", "🇨🇿"]],
  B: [["캐나다", "🇨🇦"], ["보스니아", "🇧🇦"], ["카타르", "🇶🇦"], ["스위스", "🇨🇭"]],
  C: [["브라질", "🇧🇷"], ["모로코", "🇲🇦"], ["아이티", "🇭🇹"], ["스코틀랜드", "🏴󠁧󠁢󠁳󠁣󠁴󠁿"]],
  D: [["미국", "🇺🇸"], ["파라과이", "🇵🇾"], ["호주", "🇦🇺"], ["튀르키예", "🇹🇷"]],
  E: [["독일", "🇩🇪"], ["쿠라소", "🇨🇼"], ["코트디부아르", "🇨🇮"], ["에콰도르", "🇪🇨"]],
  F: [["네덜란드", "🇳🇱"], ["일본", "🇯🇵"], ["스웨덴", "🇸🇪"], ["튀니지", "🇹🇳"]],
  G: [["벨기에", "🇧🇪"], ["이집트", "🇪🇬"], ["이란", "🇮🇷"], ["뉴질랜드", "🇳🇿"]],
  H: [["스페인", "🇪🇸"], ["카보베르데", "🇨🇻"], ["사우디", "🇸🇦"], ["우루과이", "🇺🇾"]],
  I: [["프랑스", "🇫🇷"], ["세네갈", "🇸🇳"], ["이라크", "🇮🇶"], ["노르웨이", "🇳🇴"]],
  J: [["아르헨티나", "🇦🇷"], ["알제리", "🇩🇿"], ["오스트리아", "🇦🇹"], ["요르단", "🇯🇴"]],
  K: [["포르투갈", "🇵🇹"], ["콩고DR", "🇨🇩"], ["우즈베키스탄", "🇺🇿"], ["콜롬비아", "🇨🇴"]],
  L: [["잉글랜드", "🏴󠁧󠁢󠁥󠁮󠁧󠁿"], ["크로아티아", "🇭🇷"], ["가나", "🇬🇭"], ["파나마", "🇵🇦"]],
};
const GROUP_KEYS = Object.keys(GROUPS);
const pad2 = (n) => String(n).padStart(2, "0");
function fmtCountdown(ms) {
  if (ms <= 0) return "00:00:00";
  const s = Math.floor(ms / 1000);
  const d = Math.floor(s / 86400);
  const h = Math.floor((s % 86400) / 3600);
  const m = Math.floor((s % 3600) / 60);
  const sec = s % 60;
  return (d > 0 ? d + "일 " : "") + `${pad2(h)}:${pad2(m)}:${pad2(sec)}`;
}
// 베팅 마감 여부: 결과 확정 / 경기 미설정 / 수동잠금 / 킥오프 시간 초과
function bettingClosed(match, lock, result, now) {
  if (result) return true;
  if (!match) return true;
  if (lock === "open") return false;
  if (lock === "closed") return true;
  return now >= (match.kickoff || 0); // auto
}

/* ---------- Firebase Realtime DB (REST) ---------- */
// 연결 정보는 URL 파라미터(?db=...&pool=...) > CONFIG 순으로 사용
function readUrlConfig() {
  try {
    const p = new URLSearchParams(location.search);
    return { db: p.get("db") || "", pool: p.get("pool") || "" };
  } catch (_) { return { db: "", pool: "" }; }
}
const _u = readUrlConfig();
const RT = {
  dbUrl: (_u.db || CONFIG.DB_URL || "").replace(/\/$/, ""),
  poolId: _u.pool || CONFIG.POOL_ID || "pool",
};
const base = () => `${RT.dbUrl}/pools/${RT.poolId}`;
async function dbGetPool() {
  const res = await withTimeout(fetch(`${base()}.json`), 6000);
  if (!res.ok) {
    let body = "";
    try { body = (await res.text()).slice(0, 120); } catch (_) {}
    throw new Error("HTTP " + res.status + (body ? " · " + body : ""));
  }
  return await res.json(); // null 또는 { bets:{id:{...}}, result:{...}, match:{...}, lock:"..." }
}
async function dbPut(path, value) {
  const res = await withTimeout(fetch(`${base()}/${path}.json`, {
    method: "PUT", headers: { "Content-Type": "application/json" }, body: JSON.stringify(value),
  }), 6000);
  if (!res.ok) throw new Error("put " + res.status);
}
async function dbDelete(path) {
  const url = path ? `${base()}/${path}.json` : `${base()}.json`;
  await withTimeout(fetch(url, { method: "DELETE" }), 6000);
}

function App() {
  const [dbUrl, setDbUrl] = useState(RT.dbUrl);
  const [poolId, setPoolId] = useState(RT.poolId);
  const [dbInput, setDbInput] = useState(RT.dbUrl);
  const [shareLink, setShareLink] = useState("");
  const [connDetail, setConnDetail] = useState("");
  const online = !!dbUrl;

  const [bets, setBets] = useState([]);
  const [result, setResult] = useState(null);
  const [loading, setLoading] = useState(true);
  const [busy, setBusy] = useState(false);
  const [conn, setConn] = useState(online ? "connecting" : "local"); // connecting|live|error|local

  const [name, setName] = useState("");
  const [kr, setKr] = useState(1);
  const [mx, setMx] = useState(1);
  const [error, setError] = useState("");
  const [flash, setFlash] = useState(null);
  const [editingKey, setEditingKey] = useState(null);

  const [adminOpen, setAdminOpen] = useState(false);
  const [rkr, setRkr] = useState(0);
  const [rmx, setRmx] = useState(0);
  const [unlocked, setUnlocked] = useState(false);
  const [pinError, setPinError] = useState("");
  const [reveal, setReveal] = useState("hidden");

  // 경기 설정 / 베팅 잠금
  const [match, setMatch] = useState(null);   // { group, home:{name,flag}, away:{name,flag}, kickoff(ms) }
  const [lock, setLock] = useState("auto");   // auto | open | closed
  const [now, setNow] = useState(Date.now());
  const [setupMode, setSetupMode] = useState(false);
  const [selGroup, setSelGroup] = useState("A");
  const [selHome, setSelHome] = useState(0);
  const [selAway, setSelAway] = useState(2);
  const [selKick, setSelKick] = useState("");

  useEffect(() => {
    const iv = setInterval(() => setNow(Date.now()), 1000);
    return () => clearInterval(iv);
  }, []);

  function flashMsg(m) { setFlash(m); setTimeout(() => setFlash(null), 3000); }

  async function loadPool() {
    if (!online) { setConn("local"); setLoading(false); return; }
    try {
      const data = await dbGetPool();
      const betsObj = (data && data.bets) || {};
      const arr = Object.keys(betsObj).map((k) => ({ key: k, ...betsObj[k] }))
        .sort((a, b) => (a.t || 0) - (b.t || 0));
      setBets(arr);
      const res = (data && data.result) || null;
      setResult(res);
      setReveal((r) => (res ? (r === "hidden" ? "ready" : r) : "hidden"));
      setMatch((data && data.match) || null);
      setLock((data && data.lock) || "auto");
      setConn("live");
      setConnDetail("");
    } catch (e) {
      setConn("error");
      setConnDetail((e && e.message) ? String(e.message) : "알 수 없는 오류");
    } finally {
      setLoading(false);
    }
  }
  useEffect(() => {
    RT.dbUrl = dbUrl; RT.poolId = poolId;
    setLoading(true);
    loadPool();
    if (!dbUrl) return;
    const iv = setInterval(loadPool, 4000);
    return () => clearInterval(iv);
  }, [dbUrl, poolId]);

  // derived
  const pot = bets.length * ENTRY_FEE;
  const rows = useMemo(() => {
    const g = {};
    for (const b of bets) {
      const k = `${b.kr}-${b.mx}`;
      (g[k] = g[k] || { kr: b.kr, mx: b.mx, names: [] }).names.push(b.name);
    }
    return Object.keys(g).map((k) => g[k]).map((x) => ({
      ...x, count: x.names.length, total: x.names.length * ENTRY_FEE,
      pct: bets.length ? x.names.length / bets.length : 0,
    })).sort((a, b) => b.count - a.count || a.kr - b.kr || a.mx - b.mx);
  }, [bets]);
  const maxCount = Math.max(1, ...rows.map((r) => r.count));
  const winners = useMemo(
    () => (result ? bets.filter((b) => b.kr === result.kr && b.mx === result.mx) : []),
    [bets, result]
  );
  const payout = winners.length ? Math.floor(pot / winners.length) : 0;
  const editing = !!editingKey;
  const closed = bettingClosed(match, lock, result, now);
  const msToKick = match ? (match.kickoff || 0) - now : 0;

  // actions
  async function submitBet() {
    setError("");
    if (closed) { setError("베팅이 마감되었습니다."); return; }
    const nm = name.trim();
    if (!nm) { setError("이름을 입력해 주세요."); return; }
    const id = editingKey || ("b_" + uid());
    const entry = { name: nm, kr, mx, t: editingKey ? (bets.find((b) => b.key === id)?.t || Date.now()) : Date.now() };
    setBets((prev) => editingKey ? prev.map((b) => (b.key === id ? { ...b, ...entry } : b)) : [...prev, { key: id, ...entry }]);
    setEditingKey(null); setName("");
    flashMsg(editingKey ? `수정 완료 · ${nm} · ${kr} : ${mx}` : `${nm} 님, ${kr} : ${mx} 에 10,000원 참가 완료!`);
    if (online) {
      setBusy(true);
      try { await dbPut(`bets/${id}`, entry); } catch (_) { setConn("error"); }
      setBusy(false); loadPool();
    }
  }
  function startEdit(b) {
    setEditingKey(b.key); setName(b.name); setKr(b.kr); setMx(b.mx); setError("");
    try { window.scrollTo({ top: 0, behavior: "smooth" }); } catch (_) {}
  }
  function cancelEdit() { setEditingKey(null); setName(""); setKr(1); setMx(1); setError(""); }
  async function deleteBet(b) {
    if (!window.confirm(`${b.name} 님의 ${b.kr} : ${b.mx} 베팅을 삭제할까요?`)) return;
    if (editingKey === b.key) cancelEdit();
    setBets((prev) => prev.filter((x) => x.key !== b.key));
    if (online) { try { await dbDelete(`bets/${b.key}`); } catch (_) {} loadPool(); }
  }
  async function settle() {
    const res = { kr: rkr, mx: rmx };
    setResult(res); setReveal("ready"); setAdminOpen(false);
    if (online) { try { await dbPut("result", res); } catch (_) { setConn("error"); } loadPool(); }
  }
  async function unsettle() {
    setResult(null); setReveal("hidden");
    if (online) { try { await dbDelete("result"); } catch (_) {} loadPool(); }
  }
  async function resetAll() {
    if (!window.confirm("모든 참가 기록과 결과를 삭제할까요? 되돌릴 수 없어요.")) return;
    setBets([]); setResult(null); setReveal("hidden"); cancelEdit();
    if (online) { setBusy(true); try { await dbDelete(""); } catch (_) {} setBusy(false); loadPool(); }
  }

  // 경기 설정 / 베팅 잠금 제어 (관리자)
  async function startMatch() {
    setError("");
    if (selHome === selAway) { setError("서로 다른 두 팀을 선택하세요."); return; }
    if (!selKick) { setError("경기 시작(킥오프) 시간을 입력하세요."); return; }
    const kickMs = new Date(selKick).getTime();
    if (!kickMs) { setError("시간 형식이 올바르지 않아요."); return; }
    if (bets.length > 0 && !window.confirm("새 경기를 시작하면 기존 베팅·결과가 모두 초기화됩니다. 계속할까요?")) return;
    const g = GROUPS[selGroup];
    const m = {
      group: selGroup,
      home: { name: g[selHome][0], flag: g[selHome][1] },
      away: { name: g[selAway][0], flag: g[selAway][1] },
      kickoff: kickMs,
    };
    setMatch(m); setLock("auto"); setBets([]); setResult(null); setReveal("hidden");
    setSetupMode(false);
    if (online) {
      setBusy(true);
      try {
        await dbDelete("bets"); await dbDelete("result");
        await dbPut("match", m); await dbPut("lock", "auto");
      } catch (_) { setConn("error"); }
      setBusy(false); loadPool();
    }
    flashMsg(`경기 시작! ${m.home.name} vs ${m.away.name} · 베팅 오픈`);
  }
  async function setLockState(v) {
    setLock(v);
    if (online) { try { await dbPut("lock", v); } catch (_) { setConn("error"); } loadPool(); }
    flashMsg(v === "open" ? "베팅을 수동으로 열었어요." : v === "closed" ? "베팅을 수동으로 마감했어요." : "자동(킥오프 기준)으로 전환했어요.");
  }

  function applyConnection() {
    let url = dbInput.trim().replace(/\s+/g, "").replace(/\.json$/i, "").replace(/\/+$/, "");
    const pid = (poolId || "pool").trim();
    setConnDetail("");
    if (url) {
      if (/console\.firebase\.google\.com/.test(url)) {
        setConn("error");
        setConnDetail("이건 콘솔 주소예요. Realtime Database 화면 상단의 https://...firebaseio.com (또는 ...firebasedatabase.app) 주소를 넣으세요.");
        return;
      }
      if (!(url.startsWith("http://") || url.startsWith("https://"))) url = "https://" + url;
      if (!/(firebaseio\.com|firebasedatabase\.app)/.test(url)) {
        setConn("error");
        setConnDetail("Realtime Database 주소가 아닌 것 같아요. 주소에 firebaseio.com 또는 firebasedatabase.app 이 포함돼야 해요.");
        return;
      }
    }
    setPoolId(pid);
    setDbUrl(url);
    setDbInput(url);
    setConn(url ? "connecting" : "local");
    try {
      const u = new URL(location.href);
      if (url) u.searchParams.set("db", url); else u.searchParams.delete("db");
      u.searchParams.set("pool", pid);
      history.replaceState(null, "", u.toString());
    } catch (_) {}
    flashMsg(url ? "백엔드에 연결합니다…" : "연결을 해제했어요.");
  }
  function copyShareLink() {
    let link = location.href;
    try {
      const u = new URL(location.href);
      if (dbUrl) u.searchParams.set("db", dbUrl);
      u.searchParams.set("pool", poolId);
      link = u.toString();
    } catch (_) {}
    setShareLink(link);
    try { if (navigator.clipboard) navigator.clipboard.writeText(link); } catch (_) {}
    flashMsg("공유 링크를 만들었어요. 아래 칸을 눌러 복사하세요.");
  }

  // admin pin
  function toggleAdmin() {
    setAdminOpen((v) => { const nv = !v; if (!nv) { setUnlocked(false); setPinError(""); } return nv; });
  }
  function unlockAdmin(code) {
    if (code === CONFIG.ADMIN_PIN) { setUnlocked(true); setPinError(""); }
    else setPinError("PIN이 올바르지 않아요.");
  }
  function lockAdmin() { setUnlocked(false); setPinError(""); }

  return (
    <div style={S.page}>
      {result && reveal === "playing" && (
        <RevealOverlay result={result} winners={winners} payout={payout} pot={pot} onDone={() => setReveal("done")} />
      )}
      <div style={S.shell}>
        <header style={S.board}>
          <div style={S.boardGlow} aria-hidden></div>
          <div style={S.eyebrow}>2026 월드컵 · {match ? `${match.group}조` : "스코어 맞추기"} · 스코어 맞추기 풀</div>
          <div style={S.matchup}>
            <Team flag={match ? match.home.flag : "🏳️"} name={match ? match.home.name : "팀 미정"} color={C.kr} side="left" />
            <div style={S.versus}>
              <div style={S.vsScore}>VS</div>
              <div style={S.kickoff}>
                {match ? new Date(match.kickoff).toLocaleString("ko-KR", { month: "numeric", day: "numeric", hour: "2-digit", minute: "2-digit" }) : "경기 미설정"}
              </div>
            </div>
            <Team flag={match ? match.away.flag : "🏳️"} name={match ? match.away.name : "팀 미정"} color={C.mx} side="right" />
          </div>
          <div style={S.jackpot}>
            <div style={S.jackLabel}>현재 적립 상금</div>
            <div style={S.jackValue}>{loading ? "—" : won(pot)}</div>
            <div style={S.jackSub}>우승 스코어를 맞춘 사람끼리 <b style={{ color: C.gold }}>1/N</b> 분배</div>
          </div>
          <div style={S.statRow}>

/* ---------- Reveal Overlay ---------- */
function RevealOverlay({ result, winners, payout, pot, onDone }) {
  const [phase, setPhase] = useState(0);
  const [krShown, setKrShown] = useState(0);
  const [mxShown, setMxShown] = useState(0);
  useEffect(() => {
    const t = [];
    t.push(setTimeout(() => setPhase(1), 500));
    t.push(setTimeout(() => setPhase(2), 1250));
    t.push(setTimeout(() => setPhase(3), 2000));
    t.push(setTimeout(() => setPhase(4), 2800));
    t.push(setTimeout(() => setPhase(5), 4400));
    return () => t.forEach(clearTimeout);
  }, []);
  useEffect(() => {
    if (phase < 4) return;
    let k = 0, m = 0; setKrShown(0); setMxShown(0);
    const iv = setInterval(() => {
      let done = true;
      if (k < result.kr) { k += 1; setKrShown(k); done = false; }
      if (m < result.mx) { m += 1; setMxShown(m); done = false; }
      if (done) clearInterval(iv);
    }, 200);
    return () => clearInterval(iv);
  }, [phase, result]);
  const pieces = useMemo(() => Array.from({ length: 40 }, (_, i) => ({
    left: Math.random() * 100, delay: Math.random() * 0.6, dur: 1.8 + Math.random() * 1.6,
    color: [C.gold, C.kr, C.mx, "#ffffff", C.krBlue][i % 5], size: 6 + Math.random() * 8,
  })), []);
  const win = winners.length > 0;
  return (
    <div style={S.ov} role="dialog" aria-label="결과 발표">
      <button style={S.ovSkip} onClick={onDone}>건너뛰기 ✕</button>
      {phase < 4 && (
        <div style={S.ovCenter}>
          <div style={S.ovKicker}>{phase === 0 ? "결과 공개" : "킥오프 휘슬"}</div>
          {phase === 0 && <div style={S.drum}><span style={{ ...S.dot }}></span><span style={{ ...S.dot, animationDelay: ".15s" }}></span><span style={{ ...S.dot, animationDelay: ".3s" }}></span></div>}
          {phase >= 1 && phase <= 3 && <div key={phase} style={S.count}>{4 - phase}</div>}
        </div>
      )}
      {phase >= 4 && (
        <div style={S.ovCenter}>
          <div style={S.ovKicker}>최종 스코어</div>
          <div key="board" style={S.revBoard}>
            <div style={S.revSide}><div style={S.revFlag}>🇰🇷</div><div style={{ ...S.revNum, color: C.kr }}>{krShown}</div><div style={S.revTeam}>한국</div></div>
            <div style={S.revColon}>:</div>
            <div style={S.revSide}><div style={S.revFlag}>🇲🇽</div><div style={{ ...S.revNum, color: C.mx }}>{mxShown}</div><div style={S.revTeam}>멕시코</div></div>
          </div>
          {phase >= 5 && (
            <div key="verdict" style={S.verdict}>
              {win ? (
                <div>
                  <div style={S.verWin}>🏆 당첨!</div>
                  <div style={S.verSub}>{winners.length}명 적중 · 1인당 <b style={{ color: C.gold }}>{won(payout)}</b></div>
                  <div style={S.chips}>{winners.map((w, i) => <span key={i} style={S.winChip}>{w.name}</span>)}</div>
                </div>
              ) : (
                <div>
                  <div style={S.verMiss}>적중자 없음 😢</div>
                  <div style={S.verSub}>상금 {won(pot)}은 이월 또는 환불</div>
                </div>
              )}
              <button style={S.ovConfirm} onClick={onDone}>확인</button>
            </div>
          )}
        </div>
      )}
      {phase >= 5 && win && (
        <div style={S.confettiWrap} aria-hidden>
          {pieces.map((p, i) => (
            <div key={i} style={{ position: "absolute", left: `${p.left}%`, top: 0, width: p.size, height: p.size * 0.45, background: p.color, borderRadius: 2, animation: `confettiFall ${p.dur}s linear ${p.delay}s infinite` }}></div>
          ))}
        </div>
      )}
    </div>
  );
}

/* ---------- PIN gate ---------- */
function PinGate({ onComplete, error, setError }) {
  const [val, setVal] = useState("");
  useEffect(() => {
    if (val.length < 4) return;
    const code = val;
    const t = setTimeout(() => setVal(""), 120);
    onComplete(code);
    return () => clearTimeout(t);
  }, [val]);
  const press = (d) => { setError(""); setVal((v) => (v.length < 4 ? v + d : v)); };
  const back = () => setVal((v) => v.slice(0, -1));
  const keys = ["1", "2", "3", "4", "5", "6", "7", "8", "9", "", "0", "⌫"];
  return (
    <div style={S.pinWrap}>
      <div style={S.pinHead}>관리자 PIN 입력</div>
      <div style={S.pinSub}>정산·초기화는 관리자만 가능해요.</div>
      <div style={S.pinDots}>{[0, 1, 2, 3].map((i) => <div key={i} style={{ ...S.pinDot, ...(i < val.length ? S.pinDotOn : {}) }}></div>)}</div>
      {error && <div style={S.pinErr}>{error}</div>}
      <div style={S.pinPad}>
        {keys.map((k, i) => k === "" ? <div key={i}></div> :
          <button key={i} style={S.pinKey} onClick={() => (k === "⌫" ? back() : press(k))}>{k}</button>)}
      </div>
    </div>
  );
}

      <div style={S.flag}>{flag}</div>
      <div style={{ ...S.teamName, color }}>{name}</div>
      <div style={{ ...S.teamBar, background: color, marginLeft: side === "left" ? 0 : "auto" }}></div>
    </div>
  );
}
function Stat({ label, value }) {
  return <div style={S.stat}><div style={S.statVal}>{value}</div><div style={S.statLbl}>{label}</div></div>;
}
function ScorePicker({ label, color, value, setValue, disabled }) {
  return (
    <div style={S.picker}>
      <div style={{ ...S.pickLabel, color }}>{label}</div>
      <div style={S.stepper}>
        <button style={{ ...S.stepBtn, opacity: disabled ? 0.4 : 1 }} onClick={() => setValue(Math.max(0, value - 1))} disabled={disabled}>−</button>
        <div style={{ ...S.stepVal, color, borderColor: color }}>{value}</div>
        <button style={{ ...S.stepBtn, opacity: disabled ? 0.4 : 1 }} onClick={() => setValue(Math.min(9, value + 1))} disabled={disabled}>+</button>
      </div>
    </div>
  );
}
